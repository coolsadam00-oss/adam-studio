<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shop Admin - Adam Studio</title>
  <link rel="icon" href="/static/adam-studio-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="/static/adam-studio.css">
</head>
<body class="shop-body">
  <main class="hidden-admin-page">
    <a class="brand" href="{{ adam_studio_home_url|default('/') }}" aria-label="Adam Studio home">
      <img src="/static/adam-studio-logo.jpg" alt="Adam Studio logo">
      <span>Adam Studio</span>
    </a>
    <form class="hidden-admin-panel" action="/shop/admin-login" method="post">
      <span class="support-tag">Shop Admin</span>
      <h1>Admin Login</h1>
      {% if message %}
        <p class="shop-message">{{ message }}</p>
      {% endif %}
      <input name="password" type="password" placeholder="Admin password" autofocus>
      <button class="steam-button" type="submit">Log In</button>
    </form>
  </main>
</body>
</html>
